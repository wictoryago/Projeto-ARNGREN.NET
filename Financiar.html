    <div class="tudo">

        <div>
            <h1>Valor do carro</h1>
            <input type="number" id="valorCarro" placeholder="Insira o valor">
        </div>

        <div>
            <h1>Valor da entrada</h1>
            <input type="number" id="entrada" placeholder="Insira o valor">
        </div>

        <div>
            <h1>Taxa de juros (%)</h1>
            <input type="number" id="juros" placeholder="Insira a taxa">
        </div>

        <p>
            Média das 30 menores taxas encontradas no BCB.
        </p>

        <div>
            <h1>Número de parcelas</h1>
            <input type="number" id="parcelas" placeholder="Insira o valor">
        </div>

        <div>
            <button onclick="limpar()">Limpar</button>

            <button onclick="calcular()">Calcular</button>
        </div>

        <div id="resultado"></div>

    </div>

    <script>

        function calcular() {

            let valorCarro = Number(document.getElementById("valorCarro").value);

            let entrada = Number(document.getElementById("entrada").value);

            let juros = Number(document.getElementById("juros").value);

            let parcelas = Number(document.getElementById("parcelas").value);

            let valorFinanciado = valorCarro - entrada;

            let jurosMensal = juros / 100;

            let valorParcela =
                (valorFinanciado * (1 + jurosMensal)) / parcelas;

            document.getElementById("resultado").innerHTML =
                `Valor aproximado da parcela: R$ ${valorParcela.toFixed(2)}`;
        }

        function limpar() {

            document.getElementById("valorCarro").value = "";

            document.getElementById("entrada").value = "";

            document.getElementById("juros").value = "";

            document.getElementById("parcelas").value = "";

            document.getElementById("resultado").innerHTML = "";
        }

    </script>

</body>
